## problems_per_batch = config.batch_size // config.rollouts_per_example
max_steps = 50
batch_size = 512
rollouts_per_example = 16
seq_len = 4096
mask_truncated_completions = false

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[sampling]
max_tokens = 4096


[environment]
id = "deepcoder-minimal-edit"
args = { env_type = "both" }

[wandb.log_extras]
interval = 10

[eval]

[ckpt]
interval = 200 